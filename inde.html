<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Chatbot - CodeAlpha</title><style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    background:#f4f6fb;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.chat-container{
    width:95%;
    max-width:900px;
    height:90vh;
    background:#fff;
    border-radius:20px;
    overflow:hidden;
    display:flex;
    flex-direction:column;
    box-shadow:0 10px 40px rgba(0,0,0,0.1);
}

.header{
    background:#4f46e5;
    color:white;
    padding:18px;
    text-align:center;
}

.chat-box{
    flex:1;
    overflow-y:auto;
    padding:20px;
    background:#f9fafb;
}

.message{
    margin-bottom:15px;
    max-width:80%;
    padding:12px 15px;
    border-radius:15px;
    line-height:1.5;
}

.user{
    background:#4f46e5;
    color:white;
    margin-left:auto;
}

.bot{
    background:white;
    border:1px solid #ddd;
}

.input-area{
    display:flex;
    gap:10px;
    padding:15px;
    border-top:1px solid #ddd;
}

input{
    flex:1;
    padding:12px;
    border:1px solid #ccc;
    border-radius:10px;
    outline:none;
}

button{
    padding:12px 18px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    background:#4f46e5;
    color:white;
}

.clear-btn{
    background:#ef4444;
}

.typing{
    color:#666;
    font-style:italic;
    margin-bottom:10px;
}
</style></head><body><div class="chat-container"><div class="header">
    <h2>🤖 AI Chatbot</h2>
    <p>Powered by Gemini API</p>
</div>

<div class="chat-box" id="chatBox"></div>

<div class="input-area">
    <input
        type="text"
        id="userInput"
        placeholder="Ask me anything..."
    >
    <button onclick="sendMessage()">Send</button>
    <button class="clear-btn" onclick="clearChat()">Clear</button>
</div>

</div><script>

const API_KEY = "AQ.Ab8RN61G2yIx8TnzywHfRtdZI_ykFbX29M8CG3N8YllunKJMIA";

const chatBox = document.getElementById("chatBox");

loadChat();

function addMessage(text,type){

    const div = document.createElement("div");
    div.className = `message ${type}`;
    div.innerText = text;

    chatBox.appendChild(div);

    chatBox.scrollTop = chatBox.scrollHeight;

    saveChat();
}

async function sendMessage(){

    const input = document.getElementById("userInput");

    const message = input.value.trim();

    if(!message) return;

    addMessage(message,"user");

    input.value="";

    const typing = document.createElement("div");
    typing.className="typing";
    typing.id="typing";
    typing.innerText="AI is typing...";
    chatBox.appendChild(typing);

    try{

        const response = await fetch(
        `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${API_KEY}`,
        {
            method:"POST",
            headers:{
                "Content-Type":"application/json"
            },
            body:JSON.stringify({
                contents:[
                    {
                        parts:[
                            {
                                text:message
                            }
                        ]
                    }
                ]
            })
        });

        const data = await response.json();

        document.getElementById("typing").remove();

        const reply =
        data.candidates[0].content.parts[0].text;

        addMessage(reply,"bot");

    }
    catch(error){

        document.getElementById("typing")?.remove();

        addMessage(
        "Error: Unable to connect with Gemini API.",
        "bot"
        );
    }
}

function saveChat(){
    localStorage.setItem(
        "chat_history",
        chatBox.innerHTML
    );
}

function loadChat(){
    const saved =
    localStorage.getItem("chat_history");

    if(saved){
        chatBox.innerHTML=saved;
    }
}

function clearChat(){
    localStorage.removeItem("chat_history");
    chatBox.innerHTML="";
}

document
.getElementById("userInput")
.addEventListener("keypress",function(e){

    if(e.key==="Enter"){
        sendMessage();
    }
});

</script></body>
</html>
